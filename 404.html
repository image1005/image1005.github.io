<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>跳转中...</title>
  <script>
    var path = window.location.pathname
    if (path.startsWith('/blog')) {
      window.location.replace('/blog/dist/')
    } else if (path.startsWith('/sxu_cnta')) {
      window.location.replace('/sxu_cnta/dist/')
    } else {
      window.location.replace('/')
    }
  </script>
</head>
<body>

</body>
</html>
